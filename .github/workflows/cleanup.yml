name: Cleanup Old Reports

on:
  schedule:
    - cron: '0 23 * * 0'   # Every Sunday at 23:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: scheduled (90-day policy), force_delete (targeted by date), or delete_tests (remove all test run data)'
        required: true
        default: 'scheduled'
        type: choice
        options:
          - scheduled
          - force_delete
          - delete_tests
      target:
        description: |-
          TARGET (force_delete only):
          2026             → all reports from 2026
          2026-03          → all reports from March 2026
          2026-03-31       → all reports from that day
          2026-03-31 2     → slot 2 on that day (11:45-13:15)
          Slots: 1=9:45  2=11:45  3=13:45  4=16:00
        required: false
        default: ''

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: pip install pytz gspread google-auth

      - name: Run scheduled cleanup
        if: >
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'scheduled')
        run: python scripts/cleanup_reports.py --force

      - name: Run force delete
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.mode == 'force_delete' &&
          github.event.inputs.target != ''
        run: |
          python scripts/cleanup_reports.py --delete "${{ github.event.inputs.target }}"

      - name: Delete all test run data
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.mode == 'delete_tests'
        env:
          GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/cleanup_reports.py --delete-tests

      - name: Validate target provided for force_delete
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.mode == 'force_delete' &&
          github.event.inputs.target == ''
        run: |
          echo "ERROR: force_delete mode requires a TARGET value."
          echo "Examples: '2026-03-31' or '2026-03-31 2'"
          exit 1

      - name: Commit changes
        env:
          RUN_MODE: ${{ github.event.inputs.mode || 'scheduled' }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || \
            git commit -m "Auto: cleanup $(date -u +%Y-%m-%dT%H:%M:%SZ) [$RUN_MODE]"
          git stash || true
          git pull --rebase origin main
          git stash pop || true
          git push
