name: Market Scan

on:
  schedule:
    # 9:45 ET — EST (UTC-5): 14:45 UTC | EDT (UTC-4): 13:45 UTC
    - cron: '45 14 * * 1-5'
    - cron: '45 13 * * 1-5'
    # 11:45 ET — EST: 16:45 UTC | EDT: 15:45 UTC
    - cron: '45 16 * * 1-5'
    - cron: '45 15 * * 1-5'
    # 13:45 ET — EST: 18:45 UTC | EDT: 17:45 UTC
    - cron: '45 18 * * 1-5'
    - cron: '45 17 * * 1-5'
    # 16:10 ET — EST: 21:10 UTC | EDT: 20:10 UTC
    - cron: '10 21 * * 1-5'
    - cron: '10 20 * * 1-5'
  workflow_dispatch:
    inputs:
      force_tickers:
        description: |
          Tickers to test — e.g. AAPL,MSFT,TSLA
          Leave blank for a normal scheduled run.
        required: false
        default: ''
      subsystems:
        description: |
          What to run (only applies when tickers are set above):
            all          → run all subsystems
            sub2         → run one subsystem
            sub1,sub3    → run specific subsystems
            sub1-sub4    → run a range
          Note: sub1 supplies financial data. If excluded, other subs
          that depend on it will return UNAVAILABLE for those fields.
          Leave blank = all.
        required: false
        default: 'all'
      dry_run:
        description: |
          Safe mode — true by default for all manual runs.
            true  → No email (HTML OR EMAIL)
            false → behaves exactly like a scheduled run (use only when intentional)
          Note: dry_run does NOT suppress Sub6. If sub6 is in your subsystems
          list, paper trading will run and write TEST_-tagged trades to Sheets.
          Clean up afterwards via the Cleanup workflow → delete_tests mode.
        required: false
        default: 'true'


jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scan
        env:
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GMAIL_EMAIL:           ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_PAGES_URL:      ${{ secrets.PAGES_URL }}
          FORCE_TICKERS:         ${{ github.event.inputs.force_tickers }}
          FORCE_SUBSYSTEMS:      ${{ github.event.inputs.subsystems }}
          DRY_RUN:               ${{ github.event.inputs.dry_run }}
          GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python main.py

      - name: Commit outputs
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add --force reports/output/ docs/ state/ data/fundamentals_cache/ logs/ || true
          git diff --staged --quiet || \
            git commit -m "Auto: market scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push