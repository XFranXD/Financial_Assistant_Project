name: Market Scan

on:
  schedule:
    # 9:45 ET — EST (UTC-5): 14:45 UTC | EDT (UTC-4): 13:45 UTC
    - cron: '45 14 * * 1-5'
    - cron: '45 13 * * 1-5'
    # 11:45 ET — EST: 16:45 UTC | EDT: 15:45 UTC
    - cron: '45 16 * * 1-5'
    - cron: '45 15 * * 1-5'
    # 13:45 ET — EST: 18:45 UTC | EDT: 17:45 UTC
    - cron: '45 18 * * 1-5'
    - cron: '45 17 * * 1-5'
    # 16:10 ET — EST: 21:10 UTC | EDT: 20:10 UTC
    - cron: '10 21 * * 1-5'
    - cron: '10 20 * * 1-5'
  workflow_dispatch:
    inputs:
      force_tickers:
        description: 'Debug mode — comma-separated tickers to force-run (skips all gates and market checks). Leave blank for normal run.'
        required: false
        default: ''


jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scan
        env:
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GMAIL_EMAIL:           ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_PAGES_URL:      ${{ secrets.PAGES_URL }}
          FORCE_TICKERS:         ${{ github.event.inputs.force_tickers }}
          GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python main.py

      - name: Commit outputs
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add --force reports/output/ docs/ state/ data/fundamentals_cache/ logs/ || true
          git diff --staged --quiet || \
            git commit -m "Auto: market scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push
