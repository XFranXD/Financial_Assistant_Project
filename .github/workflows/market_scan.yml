name: Market Scan

on:
  schedule:
    # 9:45 ET — EST (UTC-5): 14:45 UTC | EDT (UTC-4): 13:45 UTC
    - cron: '45 14 * * 1-5'
    - cron: '45 13 * * 1-5'
    # 11:45 ET — EST: 16:45 UTC | EDT: 15:45 UTC
    - cron: '45 16 * * 1-5'
    - cron: '45 15 * * 1-5'
    # 13:45 ET — EST: 18:45 UTC | EDT: 17:45 UTC
    - cron: '45 18 * * 1-5'
    - cron: '45 17 * * 1-5'
    # 16:10 ET — EST: 21:10 UTC | EDT: 20:10 UTC
    - cron: '10 21 * * 1-5'
    - cron: '10 20 * * 1-5'
  workflow_dispatch:
    inputs:
      force_tickers:
        description: 'Comma-separated tickers to test (e.g. AAPL,MSFT). Leave blank for normal run.'
        required: false
        default: ''
      subsystems:
        description: |
          Which subsystems to run against the forced tickers.
          Use "all" to run everything, or a range/list: "sub1-sub4", "sub2", "sub1,sub3,sub6".
          Sub dependencies: sub2 needs sub1 data. sub3,sub4,sub5,sub6 are independent of each other but need sub1.
          If sub1 is excluded, dependent subs receive no financials and will report UNAVAILABLE for data-dependent fields.
          Leave blank = "all".
        required: false
        default: 'all'
      dry_run:
        description: |
          If true (default for manual runs): suppresses paper trading writes, email send, and git commit.
          Rank board IS updated but cards are tagged FORCE so they are visually distinct.
          Set to false only when you explicitly want a manual run to behave like a scheduled one.
        required: false
        default: 'true'


jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scan
        env:
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GMAIL_EMAIL:           ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_PAGES_URL:      ${{ secrets.PAGES_URL }}
          FORCE_TICKERS:         ${{ github.event.inputs.force_tickers }}
          FORCE_SUBSYSTEMS:      ${{ github.event.inputs.subsystems }}
          DRY_RUN:               ${{ github.event.inputs.dry_run }}
          GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python main.py

      - name: Commit outputs
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add --force reports/output/ docs/ state/ data/fundamentals_cache/ logs/ || true
          git diff --staged --quiet || \
            git commit -m "Auto: market scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push
          