name: Market Scan

on:
  schedule:
    # 10:30 ET — EST (UTC-5): 15:30 UTC | EDT (UTC-4): 14:30 UTC
    - cron: '30 15 * * 1-5'
    - cron: '30 14 * * 1-5'
    # 12:30 ET — EST: 17:30 UTC | EDT: 16:30 UTC
    - cron: '30 17 * * 1-5'
    - cron: '30 16 * * 1-5'
    # 14:30 ET — EST: 19:30 UTC | EDT: 18:30 UTC
    - cron: '30 19 * * 1-5'
    - cron: '30 18 * * 1-5'
    # 16:10 ET — EST: 21:10 UTC | EDT: 20:10 UTC
    - cron: '10 21 * * 1-5'
    - cron: '10 20 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scan
        env:
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GMAIL_EMAIL:           ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_PAGES_URL:      ${{ secrets.GITHUB_PAGES_URL }}
        run: python main.py

      - name: Commit outputs
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add reports/output/ state/ data/fundamentals_cache/ logs/ || true
          git diff --staged --quiet || \
            git commit -m "Auto: market scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
