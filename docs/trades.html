e) {  if (!entryDate) return "\u2014";  var e = new Date(entryDate);  var diff = Date.now() - e.getTime();  return Math.max(0, Math.floor(diff / (1000 * 3600 * 24)));}function getPillClass(reason) {  if (reason === "TARGET_HIT") return "pt-pill-target";  if (reason === "STOP_HIT") return "pt-pill-stop";  if (reason === "TIMEOUT") return "pt-pill-timeout";  if (reason === "DROPPED") return "pt-pill-dropped";  return "pt-pill-dropped";}function renderTrades(data) {  if (!data.pt_available) {    document.getElementById("pt-mount").innerHTML =       "<div class=\"pt-unavailable\">Paper trading data unavailable \u2014 Google Sheets connection required.</div>";    if(window.dismissLoader) window.dismissLoader();    return;  }  var realOpen   = data.real_open_count   || 0;  var realNew    = data.real_new_count    || 0;  var realClosed = data.real_closed_count || 0;  var testOpen   = data.test_open_count   || 0;  var testNew    = data.test_new_count    || 0;  var hc = "<div class=\"pt-scorecard stagger-1\">";  hc += "<div class=\"pt-stat-tile\"><span class=\"pt-stat-value\">" + realOpen + "</span><span class=\"pt-stat-label\">Open Trades</span></div>";  hc += "<div class=\"pt-stat-tile\"><span class=\"pt-stat-value\">" + realNew + "</span><span class=\"pt-stat-label\">New This Run</span></div>";  hc += "<div class=\"pt-stat-tile\"><span class=\"pt-stat-value\">" + realClosed + "</span><span class=\"pt-stat-label\">Closed This Run</span></div>";  var realTotal = realOpen + realClosed;  hc += "<div class=\"pt-stat-tile\"><span class=\"pt-stat-value\">" + realTotal + "</span><span class=\"pt-stat-label\">Total Trades</span></div>";  if (testOpen > 0 || testNew > 0) {    hc += "<div class=\"pt-stat-tile pt-stat-tile-test\"><span class=\"pt-stat-value\">" + testOpen + "</span><span class=\"pt-stat-label\">TEST Open</span></div>";    hc += "<div class=\"pt-stat-tile pt-stat-tile-test\"><span class=\"pt-stat-value\">" + testNew + "</span><span class=\"pt-stat-label\">TEST New</span></div>";  }  hc += "</div>";  var allTrades = Array.isArray(data.trades) ? data.trades : [];  var realOp = allTrades.filter(function(t) { return t.status === "OPEN" && !t.is_test; });  var realCl = allTrades.filter(function(t) { return (t.status === "CLOSED" || t.status === "DROPPED") && !t.is_test; });  var testOp = allTrades.filter(function(t) { return t.status === "OPEN" && t.is_test; });  var testCl = allTrades.filter(function(t) { return (t.status === "CLOSED" || t.status === "DROPPED") && t.is_test; });  function openRow(t) {    var reg = t.market_regime || "";    var regCol = reg === "BULL" ? "var(--up)" : reg === "BEAR" ? "var(--dn)" : "var(--nt)";    var badge = t.is_test ? " <span class=\"pt-test-badge\">TEST</span>" : "";    var row = "<tr>";    row += "<td data-label=\"Ticker\" style=\"color:#fff;font-weight:700;\">" + (t.ticker || "\u2014") + badge + "</td>";    row += "<td data-label=\"Entry Date\">" + (t.entry_date || "\u2014") + "</td>";    row += "<td data-label=\"Entry $\">" + fmtPrice(t.entry_price) + "</td>";    row += "<td data-label=\"Stop $\">" + fmtPrice(t.stop_loss) + "</td>";    row += "<td data-label=\"Target $\">" + fmtPrice(t.price_target) + "</td>";    row += "<td data-label=\"R/R\">" + (t.risk_reward_ratio !== null && t.risk_reward_ratio !== undefined ? t.risk_reward_ratio.toFixed(2)+"x" : "\u2014") + "</td>";    row += "<td data-label=\"Regime\"><span style=\"color:" + regCol + "\">" + reg + "</span></td>";    row += "<td data-label=\"Quality\">" + (t.entry_quality || "\u2014") + "</td>";    row += "<td data-label=\"Days Open\">" + calcDaysOpen(t.entry_date) + "</td>";    row += "<td data-label=\"Score\">" + fmtNum(t.composite_score, 1) + "</td>";    row += "</tr>";    return row;  }  function closedRow(t) {    var dir = t.direction_correct;    var dirH = dir === true ? "<span style=\"color:#00f0ff;font-weight:bold;\">\u2713</span>" : dir === false ? "<span style=\"color:#ff2d78;font-weight:bold;\">\u2717</span>" : "\u2014";    var th>Expected %</th><th>Error %</th><th>Direction</th><th>Days</th><th>Verdict</th>";    tbl += "</tr></thead><tbody>";    rows.forEach(function(t) { tbl += closedRow(t); });    tbl += "</tbody></table></div>";    return tbl;  }  hc += "<div class=\"sl stagger-2\">OPEN TRADES</div>";  if (realOp.length === 0) {    hc += "<div class=\"stagger-2\" style=\"margin-bottom:2rem;color:var(--mist);font-size:0.9rem;\">No open trades.</div>";  } else {    hc += openTable(realOp);  }  hc += "<div class=\"sl stagger-3\">CLOSED TRADES</div>";  if (realCl.length === 0) {    hc += "<div class=\"stagger-3\" style=\"margin-bottom:2rem;color:var(--mist);font-size:0.9rem;\">No closed trades.</div>";  } else {    hc += closedTable(realCl);  }  if (testOp.length > 0 || testCl.length > 0) {    hc += "<div class=\"sl stagger-4 pt-test-section-label\">TEST TRADES \u2014 debug only, excluded from all strategy metrics</div>";    hc += "<div class=\"pt-test-notice\">These trades were generated during a debug run. They are financially realistic but do not reflect strategy decisions and will be removed by the cleanup workflow.</div>";    if (testOp.length > 0) { hc += openTable(testOp); }    if (testCl.length > 0) { hc += closedTable(testCl); }  }  document.getElementById("pt-mount").innerHTML = hc;  if(window.dismissLoader) window.dismissLoader();}function showUnavailable() {  document.getElementById("pt-mount").innerHTML =     "<div class=\"pt-unavailable\">Paper trading data unavailable \u2014 Google Sheets connection required.</div>";  if(window.dismissLoader) window.dismissLoader();}fetch("assets/data/trades.json?v=" + Date.now())  .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })  .then(function(data){ renderTrades(data); })  .catch(function(err){ showUnavailable(); });</script></body></html>
