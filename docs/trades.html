<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Paper Trading | MRE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        #mre-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.4s ease;
        }

        #mre-loader.done {
            opacity: 0;
            pointer-events: none;
        }

        .mre-bar-shell {
            position: relative;
            width: 280px;
            height: 40px;
            border: 2px solid #c850c0;
            border-radius: 6px;
            padding: 5px;
            box-shadow: 0 0 8px #c850c080, 0 0 20px #c850c040, inset 0 0 6px #c850c020;
            overflow: hidden;
        }

        .mre-bar-shell::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent calc(100% / 10 - 3px), #0a0a12 calc(100% / 10 - 3px), #0a0a12 calc(100% / 10));
            pointer-events: none;
            z-index: 2;
        }

        .mre-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            background: linear-gradient(90deg, #5c6fff, #9b59ff, #c850c0);
            box-shadow: 0 0 12px #9b59ff80;
            position: relative;
            z-index: 1;
            transition: width 0.05s linear;
        }

        #mre-loader-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 0.25em;
            color: #9b59ff;
            text-shadow: 0 0 10px #9b59ff80;
            min-width: 130px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="mre-loader">
        <div class="mre-bar-shell">
            <div class="mre-bar-fill" id="mre-bar-fill"></div>
        </div>
        <div id="mre-loader-text">LOADING</div>
    </div>
    <script>(function () { var _li = 0, _ls = ["LOADING", "LOADING.", "LOADING..", "LOADING..."]; var _lt = document.getElementById("mre-loader-text"); var _lp = setInterval(function () { _li = (_li + 1) % 4; if (_lt) _lt.textContent = _ls[_li]; }, 420); var _bf = document.getElementById("mre-bar-fill"); var _bt = null; function _bStep(ts) { if (!_bt) _bt = ts; var prog = Math.min((ts - _bt) / 1800, 1); var ease = 1 - Math.pow(1 - prog, 3); if (_bf) _bf.style.width = (ease * 100) + "%"; if (prog < 1) requestAnimationFrame(_bStep); } requestAnimationFrame(_bStep); window.dismissLoader = function () { clearInterval(_lp); if (_bf) _bf.style.width = "100%"; setTimeout(function () { var el = document.getElementById("mre-loader"); if (el) { el.classList.add("done"); setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 450); } }, 120); }; })();</script>
    <div class="scanlines"></div>
    <nav>
        <div class="brand">
            <div class="brand-pulse"></div><span>MRE // System</span>

    <div class="pages">

            <div class="pg-eyebrow">LEDGER</div>
            <div class="pg-title">Paper <span class="hi">Trading</span></div>
            <div class="pg-sub">Simulated trade ledger | Google Sheets backed<span

                    UTC")}</span></div>
            <div id="pt-mount"></div>

    </div>
    <script>function fmtPct(val) { if (val === null || val === undefined) return "\u2014"; return val.toFixed(2) + "%"; } function fmtErrPct(val) { if (val === null || val === undefined) return "\u2014"; var s = val > 0 ? "+" : ""; var c = val > 0 ? "pt-pnl-pos" : val < 0 ? "pt-pnl-neg" : ""; return "<span class=\"" + c + "\">" + s + val.toFixed(2) + "%</span>"; } function fmtPnl(val) { if (val === null || val === undefined) return "\u2014"; var c = val > 0 ? "pt-pnl-pos" : val < 0 ? "pt-pnl-neg" : ""; return "<span class=\"" + c + "\">" + val.toFixed(2) + "%</span>"; } function fmtNum(val, dec) { if (val === null || val === undefined) return "\u2014"; return val.toFixed(dec); } function fmtPrice(val) { if (val === null || val === undefined) return "\u2014"; return "$" + val.toFixed(2); } function calcDaysOpen(entryDate) { if (!entryDate) return "\u2014"; var e = new Date(entryDate); var diff = Date.now() - e.getTime(); return Math.max(0, Math.floor(diff / (1000 * 3600 * 24))); } function getPillClass(reason) { if (reason === "TARGET_HIT") return "pt-pill-target"; if (reason === "STOP_HIT") return "pt-pill-stop"; if (reason === "TIMEOUT") return "pt-pill-timeout"; if (reason === "DROPPED") return "pt-pill-dropped"; return "pt-pill-dropped"; } function renderTrades(data) { if (!data.pt_available) { document.getElementById("pt-mount").innerHTML = "<div class=\"pt-unavailable\">Paper trading data unavailable \u2014 Google Sheets connection required.</div>"; if (window.dismissLoader) window.dismissLoader(); return; } var hc = "<div class=\"pt-scorecard stagger-1\">"; hc += "<div class=\"pt-stat-tile\"><span class=\"pt-stat-value\">" + (data.open_count || 0) + "</span><span class=\"pt-stat-label\">Open Trades</span></div>"; hc += "<div class=\"pt-stat-tile\"><span class=\"pt-stat-value\">" + (data.new_count || 0) + "</span><span class=\"pt-stat-label\">New This Run</span></div>"; hc += "<div class=\"pt-stat-tile\"><span class=\"pt-stat-value\">" + (data.closed_count || 0) + "</span><span class=\"pt-stat-label\">Closed This Run</span></div>"; hc += "<div class=\"pt-stat-tile\"><span class=\"pt-stat-value\">" + (data.total_count || 0) + "</span><span class=\"pt-stat-label\">Total Trades</span></div>"; hc += "</div>"; var allTrades = Array.isArray(data.trades) ? data.trades : []; var op = allTrades.filter(function (t) { return t.status === "OPEN"; }); var cl = allTrades.filter(function (t) { return t.status === "CLOSED" || t.status === "DROPPED"; }); hc += "<div class=\"sl stagger-2\">OPEN TRADES</div>"; if (op.length === 0) { hc += "<div class=\"stagger-2\" style=\"margin-bottom:2rem;color:var(--mist);font-size:0.9rem;\">No open trades.</div>"; } else { op.sort(function (a, b) { var da = a.entry_date || ""; var db = b.entry_date || ""; return da < db ? 1 : da > db ? -1 : 0; }); hc += "<div class=\"pt-table stagger-2\"><table><thead><tr>"; hc += "<th>Ticker</th><th>Entry Date</th><th>Entry $</th><th>Stop $</th><th>Target $</th><th>R/R</th><th>Regime</th><th>Quality</th><th>Days Open (cal.)</th><th>Score</th>"; hc += "</tr></thead><tbody>"; op.forEach(function (t) { var reg = t.market_regime || ""; var regCol = reg === "BULL" ? "var(--up)" : reg === "BEAR" ? "var(--dn)" : "var(--nt)"; hc += "<tr>"; hc += "<td style=\"color:#fff;font-weight:700;\">" + (t.ticker || "\u2014") + "</td>"; hc += "<td>" + (t.entry_date || "\u2014") + "</td>"; hc += "<td>" + fmtPrice(t.entry_price) + "</td>"; hc += "<td>" + fmtPrice(t.stop_loss) + "</td>"; hc += "<td>" + fmtPrice(t.price_target) + "</td>"; hc += "<td>" + (t.risk_reward_ratio !== null ? t.risk_reward_ratio.toFixed(2) + "x" : "\u2014") + "</td>"; hc += "<td><span style=\"color:" + regCol + "\">" + reg + "</span></td>"; hc += "<td>" + (t.entry_quality || "\u2014") + "</td>"; hc += "<td>" + calcDaysOpen(t.entry_date) + "</td>"; hc += "<td>" + fmtNum(t.composite_score, 1) + "</td>"; hc += "</tr>"; }); hc += "</tbody></table></div>"; } hc += "<div class=\"sl stagger-3\">CLOSED TRADES</div>"; if (cl.length === 0) { hc += "<div class=\"stagger-3\" style=\"margin-bottom:2rem;color:var(--mist);font-size:0.9rem;\">No closed trades.</div>"; } else { cl.sort(function (a, b) { var da = a.exit_date || "0000"; var db = b.exit_date || "0000"; return da < db ? 1 : da > db ? -1 : 0; }); hc += "<div class=\"pt-table stagger-3\"><table><thead><tr>"; hc += "<th>Ticker</th><th>Entry</th><th>Exit</th><th>P&L %</th><th>Exit Reason</th><th>Expected %</th><th>Error %</th><th>Direction</th><th>Days</th><th>Verdict</th>"; hc += "</tr></thead><tbody>"; cl.forEach(function (t) { var dir = t.direction_correct; var dirH = dir === true ? "<span style=\"color:#00f0ff;font-weight:bold;\">\u2713</span>" : dir === false ? "<span style=\"color:#ff2d78;font-weight:bold;\">\u2717</span>" : "\u2014"; var res = t.exit_reason || "DROPPED"; var resH = "<span class=\"" + getPillClass(res) + "\">" + res + "</span>"; hc += "<tr>"; hc += "<td style=\"color:#fff;font-weight:700;\">" + (t.ticker || "\u2014") + "</td>"; hc += "<td>" + (t.entry_date || "\u2014") + "</td>"; hc += "<td>" + (t.exit_date || "\u2014") + "</td>"; hc += "<td>" + fmtPnl(t.live_pnl_pct) + "</td>"; hc += "<td>" + resH + "</td>"; hc += "<td>" + fmtPct(t.expected_return_pct) + "</td>"; hc += "<td>" + fmtErrPct(t.error_pct) + "</td>"; hc += "<td style=\"text-align:center;\">" + dirH + "</td>"; hc += "<td>" + (t.days_held !== null ? t.days_held : "\u2014") + "</td>"; hc += "<td>" + (t.market_verdict || "\u2014") + "</td>"; hc += "</tr>"; }); hc += "</tbody></table></div>"; } document.getElementById("pt-mount").innerHTML = hc; if (window.dismissLoader) window.dismissLoader(); } function showUnavailable() { document.getElementById("pt-mount").innerHTML = "<div class=\"pt-unavailable\">Paper trading data unavailable \u2014 Google Sheets connection required.</div>"; if (window.dismissLoader) window.dismissLoader(); } fetch("assets/data/trades.json?v=" + Date.now()).then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); }).th
